<!DOCTYPE html>
<html>
<head>
  <title>Calorie Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Calorie Planner</h1>

  <input type="number" id="weight" placeholder="Current Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="target" placeholder="Target Weight (kg)">
<input type="number" id="days" placeholder="Days to Achieve Goal">

  <button onclick="calculate()">Calculate</button>

  <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
